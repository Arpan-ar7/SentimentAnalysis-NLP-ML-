<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Emotion Detection</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:linear-gradient(
135deg,
#0f172a,
#1e293b,
#334155
);

height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}

.container{

background:white;

width:550px;

padding:40px;

border-radius:25px;

box-shadow:

0 10px 30px rgba(
0,
0,
0,
0.3
);

}

h1{

text-align:center;

color:#0f172a;

margin-bottom:10px;

}

.subtitle{

text-align:center;

color:gray;

margin-bottom:25px;

}

textarea{

width:100%;

height:160px;

padding:15px;

border:none;

outline:none;

background:#f1f5f9;

border-radius:15px;

font-size:16px;

resize:none;

transition:0.3s;

}

textarea:focus{

background:white;

border:2px solid #2563eb;

}

button{

width:100%;

padding:15px;

margin-top:20px;

border:none;

border-radius:12px;

background:#2563eb;

color:white;

font-size:18px;

cursor:pointer;

transition:0.3s;

}

button:hover{

background:#1d4ed8;

transform:scale(1.02);

}

.result{

margin-top:30px;

padding:20px;

background:#eff6ff;

border-radius:15px;

text-align:center;

}

.result h2{

color:#0f172a;

margin-bottom:10px;

}

.confidence{

font-size:18px;

color:#475569;

}

.footer{

margin-top:25px;

text-align:center;

font-size:14px;

color:gray;

}

</style>

</head>

<body>

<div class="container">

<h1>
Emotion Detection AI
</h1>

<p class="subtitle">

Enter text and detect emotion

</p>

<form
action="/predict"
method="POST"
>

<textarea

name="text"

placeholder=
"Type your sentence here..."

required

></textarea>

<button>

Predict Emotion

</button>

</form>

{% if prediction %}

<div class="result">

<h2>

{{prediction}}

</h2>

<div class="confidence">

Confidence:

{{confidence}}%

</div>

</div>

{% endif %}

<div class="footer">

Built with TF-IDF + Logistic Regression 🚀

</div>

</div>

</body>

</html>
